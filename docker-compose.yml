services:
  postgres:
    image: postgres:16-alpine
    container_name: miniblog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reviewblog
      POSTGRES_PASSWORD: reviewblog
      POSTGRES_DB: reviewblog
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewblog -d reviewblog"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
